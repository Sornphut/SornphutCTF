<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Lab3: CSRF (Vulnerable)</title>
</head>
<body>
  <h1>Lab3: CSRF (Vulnerable)</h1>
  <p>ชื่อผู้ใช้: {{ profile.user.username }}</p>
  <p>ยอดเงินคงเหลือ: {{ profile.balance }} บาท</p>

  <form method="post">
    <!-- ❌ ไม่มี csrf_token -->
    <label>เลือกบัญชีปลายทาง:</label>
    <select name="to_user">
      {% for u in users %}
        <option value="{{ u.username }}">{{ u.username }} ({{ u.profile.balance }} บาท)</option>
      {% endfor %}
    </select><br><br>

    <input type="number" name="amount" placeholder="จำนวนเงิน"><br><br>
    <button type="submit" name="action" value="transfer">โอนเงิน</button>
    <button type="submit" name="action" value="withdraw">ถอนเงิน</button>
  </form>

  {% if message %}
    <p>{{ message }}</p>

    <!-- โชว์ flag อย่างเดียว -->
    <div class="alert alert-info mt-3">
      FLAG{CSRF_VULNERABLE_SUCCESS}
    </div>
  {% endif %}
</body>
</html>
