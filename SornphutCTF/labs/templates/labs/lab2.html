<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Lab2: XSS</title>
</head>
<body>
  <h1>Lab2: XSS (Vulnerable)</h1>
  <form method="post">
    {% csrf_token %}
    <input type="text" name="comment" placeholder="Enter comment">
    <button type="submit">Submit</button>
  </form>

  <!-- แสดง flag เฉพาะเมื่อมีการโจมตีสำเร็จ -->
  {% if flag %}
    <div id="hidden-flag" style="display:none;">{{ flag }}</div>
  {% endif %}

  {% for c in comments %}
    <p>{{ c|safe }}</p>
  {% endfor %}
</body>
</html>
